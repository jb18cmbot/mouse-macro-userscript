<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="mouse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Mouse body -->
  <path d="M160 180 C160 130, 260 100, 260 180 L260 340 C260 390, 160 390, 160 340 Z" fill="url(#mouse)" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Mouse scroll wheel -->
  <rect x="200" y="170" width="20" height="40" rx="10" fill="#1a1a2e" opacity="0.6"/>
  
  <!-- Side button highlight -->
  <rect x="148" y="220" width="14" height="50" rx="7" fill="#ff9a9e" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Arrow / Lightning bolt connecting mouse to keyboard -->
  <path d="M280 250 L320 220 L310 245 L350 215 L330 248 L370 230" stroke="#e94560" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Keyboard key 1 -->
  <rect x="310" y="260" width="60" height="60" rx="12" fill="url(#key)" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
  <text x="340" y="300" font-family="monospace" font-size="28" font-weight="bold" fill="#e94560" text-anchor="middle" dominant-baseline="middle">Q</text>
  
  <!-- Keyboard key 2 -->
  <rect x="310" y="330" width="60" height="60" rx="12" fill="url(#key)" stroke="#533483" stroke-width="2"/>
  <text x="340" y="370" font-family="monospace" font-size="20" font-weight="bold" fill="#ff6b6b" text-anchor="middle" dominant-baseline="middle">⎵</text>
  
  <!-- Title text -->
  <text x="256" y="450" font-family="sans-serif" font-size="32" font-weight="bold" fill="#e0e0e0" text-anchor="middle">MOUSE MACRO</text>
</svg>
